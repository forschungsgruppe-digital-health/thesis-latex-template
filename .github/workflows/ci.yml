name: ci

# Compile the example theses on every push/PR so breakage is caught before students
# hit it. This is the status check to require on the protected `main` branch.

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:TL2025-historic   # pinned to overleaf.com's TeX Live 2025; set to ZIH's year if it differs (decision O1)
    steps:
      - uses: actions/checkout@v4

      - name: Compile example theses (pdflatex + bibtex via latexmk)
        # Recursive TEXINPUTS/BSTINPUTS make the bundled fgdh-thesis class/styles (latex/)
        # and DIN 1505 .bst (bst/) discoverable from each document's own directory —
        # the same mechanism as the dev container and the per-folder latexmkrc.
        env:
          TEXINPUTS: "${{ github.workspace }}//:"
          BSTINPUTS: "${{ github.workspace }}//:"
        run: |
          set -e
          for dir in template examples/de examples/en; do
            main=$(grep -l '\\documentclass' "$dir"/*.tex | head -1)
            echo "::group::Building $main"
            ( cd "$dir" && latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error "$(basename "$main")" )
            echo "::endgroup::"
          done

      - name: Upload built PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: |
            template/thesis.pdf
            examples/**/*.pdf
          if-no-files-found: warn
