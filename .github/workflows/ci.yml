name: ci

# Compile the example theses on every push/PR so breakage is caught before students
# hit it. This is the status check to require on the protected `main` branch.

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest   # tracks TU Dresden's ZIH Overleaf/tex service, which runs the rolling 'latest' TeX Live (decision O1)
    steps:
      - uses: actions/checkout@v4

      - name: Compile example theses (pdflatex + bibtex via latexmk)
        # Recursive TEXINPUTS/BSTINPUTS make the bundled fgdh-thesis class/styles (latex/)
        # and DIN 1505 .bst (bst/) discoverable from each document's own directory —
        # the same mechanism as the dev container and the per-folder latexmkrc.
        env:
          TEXINPUTS: "${{ github.workspace }}//:"
          BSTINPUTS: "${{ github.workspace }}//:"
        run: |
          set -e
          for dir in template examples/de examples/en; do
            main=$(grep -l '\\documentclass' "$dir"/*.tex | head -1)
            echo "::group::Building $main"
            ( cd "$dir" && latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error "$(basename "$main")" )
            echo "::endgroup::"
          done

      - name: Upload built PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: |
            template/thesis.pdf
            examples/**/*.pdf
          if-no-files-found: warn

  # Verify the FLATTENED template.zip layout compiles the way Overleaf sees it: class,
  # styles, and .bst beside thesis.tex, with NO repo search-path env. This catches
  # regressions that the in-repo `build` job cannot — most importantly a latexmkrc with
  # a recursive '..//' search path, which on Overleaf (large project parent) makes
  # kpathsea scan an enormous tree and the compile never finishes.
  overleaf-layout:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the flattened project and compile it in isolation
        run: |
          set -e
          # Assemble OUTSIDE the workspace, so the only way the class is found is by
          # sitting beside thesis.tex (as on Overleaf) — never via a repo search path.
          proj="/tmp/overleaf-proj"
          bash tools/package-template.sh "$proj"

          # Guard: the shipped latexmkrc must not reintroduce a recursive search path.
          if grep -nE '(TEXINPUTS|BSTINPUTS).*//' "$proj/latexmkrc"; then
            echo "::error::flattened latexmkrc has a recursive search path (//); this hangs Overleaf compiles"
            exit 1
          fi

          # Compile with default search paths only (no TEXINPUTS/BSTINPUTS), pdfLaTeX,
          # under a timeout so a hang fails fast instead of running out the whole job.
          cd "$proj"
          env -u TEXINPUTS -u BSTINPUTS \
            timeout 300 latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error thesis.tex
          test -f thesis.pdf && echo "Flattened Overleaf-layout project compiled standalone OK."
